<div class="team-card">
  <div class="logo-section">
    <img [src]="team.logoUrl" alt="Team Logo" />
  </div>
  <div class="info-section">
    <h2 class="team-name">{{ team.name }}</h2>
    <p><strong>Start Date:</strong> {{ team.startDate }}</p>
    <p><strong>End Date:</strong> {{ team.endDate }}</p>
    <p><strong>Location:</strong> {{ team.location }}</p>
  </div>
  <div class="team-stats-row">
    <div class="stat-box">
      <div class="stat-label">Total Matches</div>
      <div class="stat-value">{{ team.totalMatches || 0 }}</div>
    </div>
    <div class="stat-box">
      <div class="stat-label">Viewers</div>
      <div class="stat-value">{{ team.viewers | number }}</div>
    </div>
  </div>
</div>

<nav class="team-navbar">
  <ul>
    <li><a routerLink="/matches">Matches</a></li>
    <li><a routerLink="/leaderboard">Leaderboard</a></li>
    <li><a routerLink="/points-table">Points Table</a></li>
    <li><a routerLink="/stats">Stats</a></li>
    <li><a routerLink="/sponsors">Sponsors</a></li>
    <li><a routerLink="/teams">Teams</a></li>
    <li><a routerLink="/gallery">Gallery</a></li>
    <li><a routerLink="/about">About Us</a></li>
  </ul>
</nav>
