<div class="add-team-page">
  <h2 class="add-team-heading">Create New Team</h2>

  <form [formGroup]="teamForm" (ngSubmit)="onSubmit()" class="add-team-container">
    <div>

      <div class="left">

        <label for="logoInput" style="cursor:pointer;">
          <!-- <img [src]="logoUrl || 'https://via.placeholder.com/200x200'" alt="Team" /> -->
           <img src="assets/teamlogo.png" alt="teamDefault">
        </label>

        <!-- <input id="logoInput" type="file" accept="image/*" (change)="onLogoChange($event)" style="display: none;" /> -->
      </div>
      <!-- <label style="margin-left: 25px;" for="logoInput" class="upload-label">Upload Team Logo</label> -->
    </div>
    <div class="right">
      <div class="input-group">
        <label>Team Name:</label>
        <input type="text" formControlName="team_name" />
        <div *ngIf="teamForm.get('team_name')?.touched && teamForm.get('team_name')?.invalid">
          <span class="bold" style="color: red; font-weight: bold;">
            Team Name is required.
          </span>

        </div>
      </div>
      <div class="input-group">
       <label>City:</label>
      <select formControlName="city">
        <option value="">Select City</option>
        <option *ngFor="let c of cities" [value]="c">{{ c }}</option>
      </select>
      <div class="error" *ngIf="teamForm.get('city')?.touched && teamForm.get('city')?.invalid">

        <span class="bold" style="color: red; font-weight: bold">
          City is required.
        </span>
      </div>
      </div>

    

      <button class="btn btn-primary" type="submit" value="Submit">Submit</button>
    </div>

  </form>
</div>
