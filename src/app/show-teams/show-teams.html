<div class="teams-container">
	<div class="teams-header">
		<h1>Teams</h1>
		<button class="add-team-btn" (click)="onAddTeam()">ADD A NEW TEAM</button>
	</div>
	<div class="teams-table-card">
		<table class="teams-table">
			<thead>
				<tr>
					<th>Team Name <span class="sort-arrow">↑</span></th>
					<th>Members</th>
					<th>Actions</th>
				</tr>
			</thead>
			<tbody>
				<tr *ngFor="let team of pagedTeams">
					<td>{{ team.name }}</td>
					<td>
						<a class="members-link" href="#" (click)="onViewMembers(team)">{{ team.members }}</a>
					</td>
					<td>
						<button class="action-btn" (click)="onEditTeam(team)"><span class="material-icons">edit</span>✏️</button>
						<button class="action-btn" (click)="onDeleteTeam(team)"><span class="material-icons">delete</span>🗑️</button>
					</td>
				</tr>
			</tbody>
		</table>
		<div class="teams-table-footer">
			<div class="rows-per-page">
				Rows per page:
				<select [(ngModel)]="rowsPerPage" (change)="currentPage = 1">
					<option *ngFor="let n of rowsPerPageOptions" [value]="n">{{ n }}</option>
				</select>
			</div>
			<div class="pagination">
				{{ startRow + 1 }}–{{ endRow }} of {{ teams.length }}
				<button class="pagination-btn" [disabled]="currentPage === 1" (click)="prevPage()">&lt;</button>
				<span class="pagination-page">{{ currentPage }}</span>
				<button class="pagination-btn" [disabled]="endRow === teams.length" (click)="nextPage()">&gt;</button>
			</div>
		</div>
	</div>
</div>
