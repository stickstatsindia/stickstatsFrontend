
<div class="scorer-container">
  <div class="timer-section">
    <h2>Match Timer: {{ displayTime }}</h2>
    <input type="number" [(ngModel)]="setMinutes" placeholder="Min" />
    <input type="number" [(ngModel)]="setSeconds" placeholder="Sec" />
    <button (click)="setTime()">Set Time</button>
    <button (click)="startTimer()">Start</button>
    <button (click)="pauseTimer()">Pause</button>
    <button (click)="resumeTimer()">Resume</button>
    <button (click)="stopTimer()">Stop</button>
  </div>
 
  
  <div class="event-section">
    <h3>Add Match Event</h3>
    <label>Team:</label>
    <select [(ngModel)]="eventTeam" (change)="onTeamChange()">
      <option *ngFor="let team of teams" [value]="team">{{ team }}</option>
    </select>
 
    <label>Player:</label>
    <select [(ngModel)]="eventPlayer">
      <option *ngFor="let player of players[eventTeam]">{{ player }}</option>
    </select>
 
    <label>Quarter:</label>
    <select [(ngModel)]="selectedQuarter">
      <option *ngFor="let q of quarters" [value]="q">Q{{ q }}</option>
    </select>
 
    <button (click)="addEvent('Goal')">Goal</button>
    <button (click)="addEvent('Penalty Corner Earned')">Penalty Corner Earned</button>
    <button (click)="addEvent('Penalty Corner Scored')">PC Scored</button>
    <button (click)="addEvent('Green Card')">Green Card</button>
  </div>
 
  <div class="event-log">
    <h4>Match Events</h4>
    <ul>
      <li *ngFor="let e of matchEvents">{{ e }}</li>
    </ul>
  </div>
 
  
  <div class="penalty-section">
    <h3>Penalty Shootout</h3>
    <label>Team</label>
    <input [(ngModel)]="penaltyTeam" placeholder="Team Name" />
    <label>Player</label>
    <input [(ngModel)]="penaltyPlayer" placeholder="Player Name" />
    <button (click)="recordPenalty()">Record Penalty</button>
 
    <ul>
      <li *ngFor="let p of penaltyShootouts">{{ p }}</li>
    </ul>
  </div>
</div>
