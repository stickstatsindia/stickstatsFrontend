<div class="container mt-4">
  <h2 class="mb-4 text-center">Add Tournament</h2>
  <form [formGroup]="tournamentForm" (ngSubmit)="onSubmit()">

    <!-- Tournament Name & Category -->
    <div class="row">
      <div class="col-md-6 form-group">
        <label for="tournament_name" class="form-label">Tournament Name*</label>
        <input type="text" id="tournament_name" class="form-control" formControlName="tournament_name" placeholder="Enter Tournament Name">
      </div>
      <div class="col-md-6 form-group">
        <label class="form-label">Tournament Category*</label>
        <div class="d-flex flex-wrap gap-2">
          <button type="button"
                  *ngFor="let cat of tournamentCategories"
                  class="btn"
                  [ngClass]="{'btn-primary': selectedCategories.has(cat), 'btn-outline-primary': !selectedCategories.has(cat)}"
                  (click)="toggleCategory(cat)">
            {{cat}}
          </button>
        </div>
      </div>
    </div>

    <!-- City & Ground Type -->
    <div class="row">
      <div class="col-md-6 form-group">
        <label for="location" class="form-label">City*</label>
        <input type="text" id="location" class="form-control" formControlName="location" placeholder="Enter City">
      </div>
      <div class="col-md-6 form-group">
        <label class="form-label">Ground Type*</label>
        <div class="d-flex flex-wrap gap-2">
          <button type="button"
                  *ngFor="let type of groundTypes"
                  class="btn"
                  [ngClass]="{'btn-success': selectedGroundTypes.has(type), 'btn-outline-success': !selectedGroundTypes.has(type)}"
                  (click)="toggleGroundType(type)">
            {{type}}
          </button>
        </div>
      </div>
    </div>

    <!-- Organiser Name & Match Type -->
    <div class="row">
      <div class="col-md-6 form-group">
        <label for="organiserName" class="form-label">Organiser Name*</label>
        <input type="text" id="organiserName" class="form-control" formControlName="organiserName" placeholder="Enter Organiser Name">
      </div>
      <div class="col-md-6 form-group">
        <label class="form-label">Match Type*</label>
        <div class="d-flex flex-wrap gap-2">
          <button type="button"
                  *ngFor="let mt of matchTypes"
                  class="btn btn-toggle"
                  [ngClass]="{'btn-warning': selectedMatchTypes.has(mt), 'btn-outline-warning': !selectedMatchTypes.has(mt)}"
                  (click)="toggleMatchType(mt)">
            {{mt}}
          </button>
        </div>
      </div>
    </div>

    <!-- Country Code, Organiser Contact & Tournament Format -->
    <div class="row">
      <div class="col-md-4 form-group">
        <label for="countryCode" class="form-label">Country Code*</label>
        <input type="text" id="countryCode" class="form-control" formControlName="countryCode" placeholder="+91">
      </div>
      <div class="col-md-4 form-group">
        <label for="organiserContact" class="form-label">Organiser Contact*</label>
        <input type="text" id="organiserContact" class="form-control" formControlName="organiserContact" placeholder="Phone Number">
      </div>
      <div class="col-md-4 form-group">
        <label class="form-label d-block">Tournament Format*</label>
        <div class="d-flex flex-wrap gap-2">
          <button type="button"
                  *ngFor="let format of tournamentFormats"
                  class="btn btn-toggle"
                  [ngClass]="{'btn-warning': selectedFormats.has(format), 'btn-outline-warning': !selectedFormats.has(format)}"
                  (click)="toggleFormat(format)">
            {{format}}
          </button>
        </div>
      </div>
    </div>

    <!-- Allow Contact Checkbox -->
    <div class="form-group form-check mb-2">
      <input type="checkbox" class="form-check-input" id="allowContact" formControlName="allowContact">
      <label class="form-check-label" for="allowContact">Allow players to contact me for Team Registration</label>
    </div>

    <!-- Start Date & End Date -->
    <div class="row date-row">
      <div class="col-md-6 form-group">
        <label for="start_date" class="form-label">Start Date*</label>
        <input type="date" id="start_date" class="form-control" formControlName="start_date">
      </div>
      <div class="col-md-6 form-group">
        <label for="end_date" class="form-label">End Date*</label>
        <input type="date" id="end_date" class="form-control" formControlName="end_date">
      </div>
    </div>

    <!-- Submit Button -->
    <div class="text-center mt-3">
      <button type="submit" class="btn btn-primary px-5">Submit</button>
    </div>
  </form>
</div>
