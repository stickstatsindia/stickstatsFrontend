<div class="members-header">
  <h1>Members of Team</h1>
  <button class="add-player-btn" (click)="onAddPlayer()">+ Add Player</button>
</div>

<!-- 🔄 Loading indicator -->
<div class="loading" *ngIf="isLoading">
  <p>Loading team members...</p>
</div>

<!-- ❌ Error message -->
<div class="error-message" *ngIf="!isLoading && error">
  {{ error }}
</div>

<!-- ✅ Members Grid -->
<div class="members-grid" *ngIf="!isLoading && !error">
  <!-- Show members if available -->
  <div class="member-card" *ngFor="let member of teamMembers">
    <div class="member-avatar" [attr.data-initials]="getInitials(member.name)">
      <div class="initials">{{ getInitials(member.name) }}</div>
      <div class="role-badge">{{ member.role }}</div>
    </div>
    <div class="member-name">{{ member.name }}</div>
    <div class="member-phone">{{ member.phone_number }}</div>
  </div>



<!-- ℹ️ No members message (only if API success but no members) -->
<div class="no-members" *ngIf="!isLoading && !error && teamMembers.length === 0">
  <p>No team members found. Add players to your team.</p>
  <button class="add-player-btn" (click)="onAddPlayer()">ADD PLAYER</button>
</div>
