<div class="members-grid" *ngIf="teamMembers && teamMembers.length > 0">
    <div class="member-card" *ngFor="let member of teamMembers">
      <div class="member-avatar">
        <img src="assets/default-avatar.png" 
             [alt]="member.name"
             class="member-img">
        <div class="role-badge">{{member.role}}</div>
      </div>
      <div class="member-name">{{ member.name }}</div>
      <div class="member-phone">{{ member.phone_number }}</div>
    </div>
  </div>

  <!-- No members message -->
  <div class="no-members" *ngIf="!isLoading && (!teamMembers || teamMembers.length === 0)">
    <p>No team members found. Add players to your team.</p>
  </div>

  <!-- Loading indicator -->
  <div class="loading" *ngIf="isLoading">
    <p>Loading team members...</p>
  </div>

  <!-- Error message -->
  <div class="error-message" *ngIf="error">
    {{ error }}
  </div>
 
  <div class="members-header">
    <h1>Members of Team</h1>
    <button class="add-player-btn" (click)="onAddPlayer()">ADD PLAYER</button>
  </div>

  <div class="members-grid">
    <div class="member-card" *ngFor="let member of teamMembers">
      <div class="member-avatar">
        <img [src]="'assets/default-avatar.png'" 
             [alt]="member.name"
             class="member-img">
        
      </div>
        <div class="member-name">{{ member.name }}</div>
    </div>
  </div>
