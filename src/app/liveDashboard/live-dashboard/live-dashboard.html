<div class="dashboard-container" [class.embedded]="embedded">
  <div class="live-dashboard-container">
    <h1>{{ dashboardTitle }}</h1>

    <div class="navbar">
      <button (click)="selectTab('Live')" [class.active]="selectedTab === 'Live'">Live</button>
      <button (click)="selectTab('Upcoming')" [class.active]="selectedTab === 'Upcoming'">Upcoming</button>
      <button (click)="selectTab('Finished')" [class.active]="selectedTab === 'Finished'">Finished</button>
    </div>

    <div class="match-list">
      <ng-container *ngFor="let match of visibleMatches">
        <div class="match-card" [routerLink]="['/result', match.matchId]">
          <h3>{{ match.team1Name }} vs {{ match.team2Name }}</h3>
          <p *ngIf="selectedTab !== 'Upcoming'">
            Score: {{ match.team1Score }} - {{ match.team2Score }}
          </p>
          <p>Time: {{ match.matchTime }} | Venue: {{ match.venue }}</p>
          <p>Status: <strong [ngClass]="match.status.toLowerCase()">{{ match.status }}</strong></p>
        </div>
      </ng-container>
    </div>

    <p class="empty-state" *ngIf="visibleMatches.length === 0">
      No {{ selectedTab.toLowerCase() }} matches found.
    </p>
  </div>
</div>
