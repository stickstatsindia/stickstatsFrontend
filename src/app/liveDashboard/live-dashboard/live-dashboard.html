<div class="dashboard-container">
  <div class="live-dashboard-container">
    <h1>🏑 Matches Dashboard</h1>

    <div class="navbar">
      <button (click)="selectedTab = 'Live'" [class.active]="selectedTab === 'Live'">Live</button>
      <button (click)="selectedTab = 'Upcoming'" [class.active]="selectedTab === 'Upcoming'">Upcoming</button>
      <button (click)="selectedTab = 'Finished'" [class.active]="selectedTab === 'Finished'">Finished</button>
    </div>

    <div class="match-list">
      <ng-container *ngFor="let match of filteredMatches()">
        <div class="match-card" [routerLink]="['/result', match.matchId]">
          <h3>{{ match.team1Name }} vs {{ match.team2Name }}</h3>
          <p *ngIf="selectedTab !== 'Upcoming'">
            Score: {{ match.team1Score }} - {{ match.team2Score }}
          </p>
          <!-- <p *ngIf="selectedTab === 'Live' && timers[match.match_id]">
            ⏱ Timer: 
            {{ format(timers[match.match_id].minutes) }}:{{ format(timers[match.match_id].seconds) }}
          </p> -->

          <p>Time: {{ match.matchTime }} | Venue: {{ match.venue }}</p>
          <p>Status: <strong [ngClass]="match.status.toLowerCase()">{{ match.status }}</strong></p>
        </div>
      </ng-container>
    </div>
  </div>
