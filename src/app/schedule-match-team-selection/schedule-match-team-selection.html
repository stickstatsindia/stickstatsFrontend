<div class="container">
  <div class="card">
    <h2>Schedule a Match</h2>
    <p class="note">Let's start the battle!!</p>

  <form [formGroup]="form">

        <div class="teams">
        <div class="team">
          <label for="teamA">Select Team A:</label>
          <select formControlName="home_team" id="teamA" required>
            <option *ngFor="let team of teams" [ngValue]="team">{{ team.name }}</option>
          </select>
        </div>
        <div class="vs">VS</div>
        <div class="team">
          <label for="teamB">Select Team B:</label>
          <select formControlName="away_team" id="teamB" required>
            <option *ngFor="let team of teams" [ngValue]="team">{{ team.name }}</option>
          </select>
        </div>
      </div>

      <div>
  <label for="venue">Venue:</label>
  <input id="venue" formControlName="venue" required />
      </div>
      <div>
  <label for="match_date">Match Date:</label>
  <input id="match_date" type="date" formControlName="match_date" required />
          <div *ngIf="form.controls['match_date'].invalid && (form.controls['match_date'].touched || form.controls['match_date'].dirty)">
            <small class="error" *ngIf="form.controls['match_date'].hasError('required')">Match date is required.</small>
            <small class="error" *ngIf="form.controls['match_date'].hasError('notFuture')">Match date must be in the future.</small>
            <small class="error" *ngIf="form.controls['match_date'].hasError('outsideTournamentDates')">Match date must be within the official tournament dates.</small>
          </div>
      </div>
        <div>
      <label for="match_time">Match Time:</label>
      <input id="match_time" type="time" formControlName="match_time" required />
        </div>

        <!-- Team members are fetched and managed internally; no UI display per requirement -->

      <div class="button-group">
        <button class="btn back" type="button" (click)="goToPreviousStep()">BACK</button>
  <button class="btn next" type="button" [disabled]="form.invalid" (click)="goToNextStep()">NEXT</button>
      </div>
    </form>
  </div>
</div>
