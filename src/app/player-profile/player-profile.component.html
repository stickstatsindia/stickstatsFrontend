<div class="profile-container">
  <div class="profile-header">
    <div class="profile-left">
      <img [src]="profile.imageUrl" class="profile-img" alt="Profile" />
      <div class="profile-details">
        <div class="name-row">
          <h2>{{ profile.name }}</h2>
          <span *ngIf="profile.isPro" class="pro-badge">PRO</span>
        </div>
        <p>{{ profile.location }} • {{ profile.views }} Views</p>
        <p>{{ profile.battingStyle }}</p>
      </div>
    </div>
    <div class="profile-stats">
      <div class="stat-box">
        <div class="stat-value">{{ profile.matches }}</div>
        <div class="stat-label">MATCHES</div>
      </div>
      <div class="stat-box">
        <div class="stat-value">{{ profile.runs }}</div>
        <div class="stat-label">GOALS</div>
      </div>
      
    </div>
  </div>

  <div class="nav-tabs">
    <div *ngFor="let item of menu" class="nav-tab" [class.active]="item === 'MATCHES'">
      {{ item }}
    </div>
  </div>
</div>
