
<div class="profile-header">
  <div class="left-section">
    <img src="assets/player.jpg" alt="Player Photo" class="player-photo" />
    <div class="player-info">
      <h2>{{ player.name }} <span class="pro-badge">PRO</span></h2>
      <p>{{ player.location }} • {{ player.views }} Views</p>
      <p>{{ player.role }}</p>
    </div>
  </div>

  <div class="stats-section">
    <div class="stat-box">
      <h1>{{ player.stats.matches }}</h1>
      <p>MATCHES</p>
    </div>
    <div class="stat-box">
      <h1>{{ player.stats.runs }}</h1>
      <p>RUNS</p>
    </div>
    <div class="stat-box">
      <h1>{{ player.stats.wickets }}</h1>
      <p>WICKETS</p>
    </div>
  </div>
</div>

<div class="tab-bar">
  <button>
    text
  </button>
  <button
    *ngFor="let tab of tabs"
    [class.active]="selectedTab === tab"
    (click)="selectTab(tab)">
    {{ tab }}
  </button>
</div>
