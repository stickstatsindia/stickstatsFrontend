
<div class="profile-card">
  <div class="profile-main-row">
    <div class="profile-logo-section">
      <img [src]="profile.imageUrl" alt="Profile" />
    </div>
    <div class="profile-info-section">
      <h2 class="profile-name">{{ profile.name }} <span *ngIf="profile.isPro" class="pro-badge">PRO</span></h2>
      <p><strong>Location:</strong> {{ profile.location }}</p>
      <p><strong>Position:</strong> {{ profile.battingStyle }}</p>
    </div>
    <div class="profile-stats-row">
      <div class="stat-box">
        <div class="stat-label">Matches</div>
        <div class="stat-value">{{ profile.matches }}</div>
      </div>
      <div class="stat-box">
        <div class="stat-label">Goals</div>
        <div class="stat-value">{{ profile.runs }}</div>
      </div>
    </div>
  </div>
  <div class="profile-navbar">
    <div class="profile-tabs">
      <div *ngFor="let item of menu"
           class="profile-tab"
           [class.active]="item === selectedTab"
           (click)="onTabSelect(item)">
        {{ item }}
      </div>
    </div>
  </div>
</div>
