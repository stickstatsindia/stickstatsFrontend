<div class="container my-5">
  <div class="row align-items-center">
    <!-- Left: Image -->
    <div class="col-md-6 mb-4 mb-md-0 text-center">
      <img
        src="https://i.postimg.cc/W1tWLcvy/5124556.jpg"
        alt="Contact"
        class="img-fluid rounded shadow"
      />
    </div>

    <!-- Right: Form -->
    <div class="col-md-6">
      <h2 class="mb-4 text-center text-md-start">Get in Touch</h2>
      <form (ngSubmit)="submitForm()">
        <div class="mb-3">
          <label class="form-label">Name</label>
          <input [(ngModel)]="name" name="name" class="form-control" required />
        </div>
        <div class="mb-3">
          <label class="form-label">Email</label>
          <input [(ngModel)]="email" name="email" type="email" class="form-control" required />
        </div>
        <div class="mb-3">
          <label class="form-label">Message</label>
          <textarea [(ngModel)]="message" name="message" class="form-control" rows="4" required></textarea>
        </div>
        <button class="btn btn-primary w-100" type="submit">Send Message</button>
      </form>
    </div>
  </div>
</div>
