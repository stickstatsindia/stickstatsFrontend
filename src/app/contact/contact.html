<div class="color" >
<div class="container my-5" >
  <div class="row align-items-center">
     <h2 class="mb-4 text-center" >Contact Us</h2>
<!-- Left: Image -->
    <div class="col-md-6 mb-4 mb-md-0 d-flex justify-content-left align-items-center">
      <img
         src="assets/finalStickStats.png"
         alt="Logo"
         
         style="max-height: 25em; width: auto; height: auto;"
      />
    </div>


    <!-- Right: Form -->
    <div class="col-md-6">
      <form (ngSubmit)="submitForm()">
        <h3 class="mb-4 text-center text-md-start">Let's Start a Conversation</h3>
        <div class="mb-3">
          <label class="form-label">Name</label>
          <input [(ngModel)]="name" name="name" class="form-control" required />
        </div>
        <div class="mb-3">
          <label class="form-label">Email</label>
          <input [(ngModel)]="email" name="email" type="email" class="form-control" required />
        </div>
        <div class="mb-3">
          <label class="form-label">Message</label>
          <textarea [(ngModel)]="message" name="message" class="form-control" rows="4" required></textarea>
        </div>
        <button class="btn btn-primary w-100" type="submit">Send Message</button>
      </form>
    </div>
  </div>
</div>
</div>
