<div *ngIf="data?.penaltyShootout" class="penalty-shootout-container">
  <h3 class="shootout-title">Penalty Shootout</h3>
  
  <div class="shootout-grid">
    <!-- Home Team Block -->
    <div class="shootout-team-section home-shootout">
      <div class="shootout-team-header">
        <div class="shootout-team-name">{{ data.teams.home.name }}</div>
        <div class="shootout-team-score">{{ homeShootoutScore }}</div>
      </div>
      
      <div class="shootout-attempts-list">
        <div *ngFor="let shot of data.penaltyShootout.home; let i = index" 
             class="shootout-attempt-row">
          <span class="attempt-number">{{ i + 1 }}</span>
          <span class="attempt-player">{{ shot.player }}</span>
          <span class="attempt-result" [ngClass]="shot.scored ? 'result-scored' : 'result-missed'">
            <ng-container *ngIf="shot.scored; else missedHome">&#9679;</ng-container>
            <ng-template #missedHome>&#10006;</ng-template>
          </span>
        </div>
      </div>
    </div>

    <!-- VS Divider -->
    <div class="shootout-divider">
      <span class="divider-dash">—</span>
    </div>

    <!-- Away Team Block -->
    <div class="shootout-team-section away-shootout">
      <div class="shootout-team-header">
        <div class="shootout-team-name">{{ data.teams.away.name }}</div>
        <div class="shootout-team-score">{{ awayShootoutScore }}</div>
      </div>
      
      <div class="shootout-attempts-list">
        <div *ngFor="let shot of data.penaltyShootout.away; let i = index" 
             class="shootout-attempt-row shootout-attempt-away">
          <span class="attempt-result" [ngClass]="shot.scored ? 'result-scored' : 'result-missed'">
            <ng-container *ngIf="shot.scored; else missedAway">&#9679;</ng-container>
            <ng-template #missedAway>&#10006;</ng-template>
          </span>
          <span class="attempt-player">{{ shot.player }}</span>
          <span class="attempt-number">{{ i + 1 }}</span>
        </div>
      </div>
    </div>
  </div>
</div>
