
<div class="page-wrapper">
  <div class="player-card">
    <div class="modal-header">
      <span class="modal-title">Add a Teammate Using Their Phone Number</span>
    <!-- <button class="close-btn" aria-label="Close">&times;</button> -->
  </div>

<div class="modal-container">

  <div class="tab-content">
    <form [formGroup]="playerForm" (ngSubmit)="addTeam()">
      <div class="form-row">
        <div class="logo-upload">
          <div class="logo-box">
            <span class="logo-placeholder">👤</span>
          </div>
          <div class="logo-desc">
            <strong>Player Profile </strong>
          </div>
        </div>
        <div class="form-fields">
          <label>
            Player Name* (Will be auto fetch via phone number)
            <input formControlName="playerName" placeholder="Player Name" readonly />
          </label>
          <label>
            Phone Number* (Player have to be a registered user)
            <input formControlName="phone_number" placeholder="Valid Phone Number" maxlength="10" />
          </label>
        </div>
        <!-- Success Message from GET API (fetchPlayerByPhone) -->
        <div class="message success" *ngIf="successMessage && messageType === 'success'">
          <div class="text-success">✓ {{ successMessage }}</div>
        </div>
        <!-- Error Message from GET API (fetchPlayerByPhone) -->
        <div class="message error" *ngIf="errorMessage && messageType === 'error'">
          <div class="text-danger">✗ {{ errorMessage }}</div>
        </div>
        <!-- Validation Errors -->
        <div class="error" *ngIf="playerForm.get('phone_number')?.touched && playerForm.get('phone_number')?.invalid">
          <div class="text-danger" *ngIf="playerForm.get('phone_number')?.errors?.['required']">
            Phone number is required.
          </div>
          <div class="text-danger" *ngIf="playerForm.get('phone_number')?.errors?.['pattern']">
            Enter a valid 10-digit phone number starting with 6, 7, 8, or 9.
          </div>
        </div>
      </div>
      <button class="add-btn" type="submit" [disabled]="!playerForm.valid">ADD NEW PLAYER</button>
    </form>
  </div>
</div>
  </div>
</div>
