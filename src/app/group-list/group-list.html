<div class="container py-4">
  <div class="d-flex justify-content-between align-items-center mb-4">
    <h3 class="fw-bold">All Pools</h3>
    <button class="btn btn-primary" (click)="addNewGroup()">+ Add Pool</button>
  </div>

  <!-- Pools Table -->
  <div class="table-responsive">
    <table class="table table-hover align-middle border shadow-sm rounded">
      <thead class="table-light">
        <tr>
          <th>Pool Name</th>
          <th>Type</th>
          <th>Teams</th>
          <th class="text-center">Actions</th>
        </tr>
      </thead>
      <tbody>
        <tr *ngFor="let pool of pools">
          <td>{{ pool.name }}</td>
          <td>{{ pool.type }}</td>
          <td>
            <div class="d-flex flex-column">
              <span *ngFor="let team of pool.teams" class="text-primary">
                {{ team.team_name }}
              </span>
            </div>
          </td>
          <td class="text-center">
            <button
              class="btn btn-sm btn-outline-secondary me-2"
              (click)="editGroup(pool)"
              title="Edit Pool"
            >
              ✏️
            </button>
            <button
              class="btn btn-sm btn-outline-danger"
              (click)="deleteGroup(pool)"
              title="Delete Pool"
            >
              🗑️
            </button>
          </td>
        </tr>
      </tbody>
    </table>
  </div>

      </table>
    </div>
  </div> -->

  <!-- Pagination -->
  <div class="d-flex justify-content-between align-items-center mt-3">
    <div>
      Rows per page:
      <select
        [(ngModel)]="rowsPerPage"
        class="form-select d-inline-block w-auto ms-2"
      >
        <option *ngFor="let size of [5, 10, 25]" [value]="size">
          {{ size }}
        </option>
      </select>
    </div>
    <div>
      <span>1–{{ pools.length }} of {{ pools.length }}</span>
      <button class="btn btn-sm btn-light ms-2" disabled>‹</button>
      <button class="btn btn-sm btn-light" disabled>›</button>
    </div>
  </div>
</div>
