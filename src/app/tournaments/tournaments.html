<div class="container">
  <div class="header">
    <h2>Tournaments</h2>
    <button class="add-btn" (click)="addTournament()">ADD A NEW TOURNAMENT</button>
  </div>

  <div class="table-wrapper">
    <table *ngIf="tournaments.length > 0; else noData">
      <thead>
        <tr>
          <th>Name</th>
          <th>From Date</th>
          <th>To Date</th>
          <th>Actions</th>
        </tr>
      </thead>
      <tbody>
        <tr *ngFor="let t of tournaments; let i = index">
          <td><a href="#" class="name-link">{{ t.tournament_name }}</a></td>
          <td>{{ t.start_date | date:'yyyy-MM-dd' }}</td>
          <td>{{ t.end_date | date:'yyyy-MM-dd' }}</td>
          <td class="actions">
            <button (click)="editTournament(i)">✏️</button>
            <button (click)="deleteTournament(i)">🗑️</button>
            <div class="settings-dropdown-wrapper" style="display:inline-block;position:relative;">
              <button (click)="openSettings(i)">⚙️</button>
              <div *ngIf="settingsOpenIndex === i" class="settings-dropdown">
                <button (click)="goToTeams(t.tournament_id)">Teams</button>
                <button (click)="goToGroups()">Groups</button>
              </div>
            </div>
          </td>
        </tr>
      </tbody>
    </table>
    <ng-template #noData>
      <p class="no-data">No tournaments available.</p>
    </ng-template>
  </div>
</div>
