<div class="container">
  <div class="header">
    <h2>Tournaments</h2>
    <button class="add-btn" (click)="addTournament()">ADD A NEW TOURNAMENT</button>
  </div>

  <div class="table-wrapper">
    <table *ngIf="tournaments.length > 0; else noData">
      <thead>
        <tr>
          <th>Name</th>
          <th>From Date</th>
          <th>To Date</th>
          <th>Actions</th>
        </tr>
      </thead>
      <tbody>
        <tr *ngFor="let t of tournaments; let i = index">
          <td data-label="Tournament"><a href="#" class="name-link" (click)="goToTeamManagement(t.tournament_id, $event)">{{ t.tournament_name }}</a></td>
          <td data-label="From Date">{{ t.start_date | date:'yyyy-MM-dd' }}</td>
          <td data-label="To Date">{{ t.end_date | date:'yyyy-MM-dd' }}</td>
          <td data-label="Actions" class="actions">
            <button class="edit-btn" (click)="editTournament(t.tournament_id)">Edit</button>
            <button class="delete-btn" (click)="deleteTournament(t.tournament_id)">Delete</button>
            <div class="settings-dropdown-wrapper" style="position:relative;">
              <button class="btn btn-info dropdown-toggle" type="button" (click)="openSettings(i)">Settings</button>
              <div *ngIf="settingsOpenIndex === i" class="settings-dropdown">
                <button (click)="goToTeams(t.tournament_id)">Teams</button>
                <button (click)="goToGroups(t.tournament_id)">Pools</button>
                <button (click)="goToMatches(t.tournament_id)">Matches</button>
              </div>
            </div>
          </td>
        </tr>
      </tbody>
    </table>
    <ng-template #noData>
      <p class="no-data">No tournaments available.</p>
    </ng-template>
  </div>
</div>
